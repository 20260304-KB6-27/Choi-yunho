<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vue 3 연습용 Composition</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link
      rel="stylesheet"
      href="https://unpkg.com/bootstrap@5.2.3/dist/css/bootstrap.min.css"
    />
    <style>
      body {
        margin: 0;
        padding: 0;
        font-family: sans-serif;
      }
      .title {
        text-align: center;
        font-weight: bold;
        font-size: 20pt;
      }
      .todo-done {
        text-decoration: line-through;
      }
      .container {
        padding: 10px 10px 10px 10px;
      }
      .panel-borderless {
        border: 0;
        box-shadow: none;
      }
      .pointer {
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div id="app" class="container">
      <div class="card card-body bg-light">
        <h1>:: Todolist App</h1>
      </div>

      <!-- Todo 추가 -->
      <div class="card card-default card-borderless">
        <div class="row mb-3">
          <div class="col">
            <div class="input-group">
              <!-- @keyup.enter : enter키를 누르면 addTodo 함수 호출 -->
              <input
                type="text"
                class="form-control"
                @keyup.enter="addTodo"
                @keyup.ctrl.enter.exact="addTodo"
                v-model.trim="todo"
              />
              <button
                class="btn btn-primary input-group-addon"
                @click="addTodo"
              >
                추가
              </button>
            </div>
          </div>
        </div>
      </div>
      <!-- Todo 목록 보여주기 -->
      <div class="row">
        <div class="col">
          <ul class="list-group">
            <li
              v-for="todoitem in todolist"
              @click="toggleCompleted(todoitem.id)"
              ::key="todoitem.id"
              class="list-group-item"
              :class="{ 'list-group-item-success': todoitem.completed } "
            >
              <span
                class="pointer"
                :style="{textDecoration : todoitem.completed ? 'line-through' : 'none'}"
              >
                {{ todoitem.todo }} {{todoitem.completed ? '[완료]' : ""}}</span
              >

              <!-- 삭제하기 -->
              <span
                class="float-end badge bg-secondary pointer"
                @click="deleteTodo(todoitem.id)"
                >삭제</span
              >
            </li>
          </ul>
        </div>
      </div>
    </div>

    <script>
      const { createApp, ref } = Vue;

      let ts = new Date().getTime();

      createApp({
        setup() {
          const todo = ref('');

          const todolist = ref([
            { id: ts, todo: '자전거 타기', completed: false },
            { id: ts + 1, todo: '딸과 공원 산책', completed: true },
            { id: ts + 2, todo: '일요일 애견 카페', completed: false },
            { id: ts + 3, todo: 'Vue 원고 집필', completed: false },
          ]);

          const deleteTodo = (id) => {
            // findIndex(콜백) : 콜백함수가 true를 반환하는 첫번째 요소의 인덱스를 반환
            let index = todolist.value.findIndex((item) => id === item.id);

            // splice(인덱스, 삭제할 요소의 갯수) : 인덱스부터 갯수만큼 배열의 요소 삭제
            todolist.value.splice(index, 1);
          };

          // 완료 상태 토글 기능
          const toggleCompleted = (id) => {
            // findIndex(콜백) : 콜백함수가 true를 반환하는 첫번째 요소의 인덱스를 반환
            let index = todolist.value.findIndex((item) => id === item.id);

            todolist.value[index].completed = !todolist.value[index].completed;
          };

          // create todo
          const addTodo = (e) => {
            // 빈 문자열 일 경우 동작 안 함
            if (todo.value === '') {
              return;
            }

            // 배열에  추가
            todolist.value.push({
              id: new Date().getTime(),
              todo: todo.value,
              // ctrl + enter를 했을 때 완료 상태로 저장
              completed: e.ctrlKey ? true : false,
            });

            // todo 초기화
            todo.value = '';
          };
          return {
            todo,
            todolist,
            deleteTodo,
            addTodo,
            toggleCompleted,
          };
        },
      }).mount('#app');
    </script>
  </body>
</html>
