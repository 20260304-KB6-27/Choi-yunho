<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vue 게시판 목록</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link
      rel="stylesheet"
      href="https://unpkg.com/bootstrap@5.2.3/dist/css/bootstrap.min.css"
    />
  </head>
  <body>
    <div id="app">
      <h1>📌 게시판 목록 v3</h1>
      <br />

      <!-- 아래의 목록을 완성하세요 -->
      <div>
        <div class="row justify-content-center">
          <div class="col d-flex justify-content-center">
            <div class="input-group" style="max-width: 600px">
              <input
                type="text"
                class="form-control"
                v-model="newPostTitle"
                placeholder="제목 입력"
              />
              <input
                type="text"
                class="form-control"
                v-model="newPostContent"
                placeholder="내용 입력"
              />
            </div>
            <button @click="addPost">추가</button>
          </div>
        </div>
      </div>
      <br />
      <hr />
      <br />
      <ul>
        <li
          class="post-item"
          v-for="post in sortPost"
          :key="post.no"
          @click="clickPost(post)"
        >
          {{ post.no }}. {{ post.title }}
          <span class="arrow">
            {{ isPostOpen && selectedPost?.no === post.no ? arrow[0] : arrow[1]
            }}
          </span>

          <div
            class="post-content"
            v-if="isPostOpen && selectedPost?.no === post.no"
            @click.stop
          >
            <div v-if="isEditMode">
              <input
                type="text"
                class="form-control mb-2"
                v-model="editingTitle"
              />
              <textarea
                class="form-control mb-2"
                v-model="editingContent"
                rows="3"
              ></textarea>
              <button @click.stop="updatePost(post.no)">수정 완료</button>
              <button
                @click.stop="isEditMode = false"
                style="background-color: #888"
              >
                취소
              </button>
            </div>

            <div v-else>
              <strong>{{ selectedPost.title }}</strong>
              <hr />
              {{ selectedPost.content }}
              <br /><br />
              <button @click.stop="deletePost(post.no)">삭제</button>
              <button @click.stop="editPost(post)">수정</button>
              <button @click.stop="isPostOpen = false">닫기</button>
            </div>
          </div>
        </li>
      </ul>

      <!-- 아래의 div를 완성하세요 -->
    </div>
    <script>
      const { createApp, ref, computed } = Vue;

      createApp({
        setup() {
          const posts = ref([
            {
              no: 1,
              title: 'Vue.js 기초 배우기',
              content:
                'Vue.js는 사용자 인터페이스를 구축하기 위한 프로그레시브 프레임워크입니다.',
            },
            {
              no: 2,
              title: '자바스크립트 ES6 문법',
              content:
                'ES6는 JavaScript의 최신 문법을 포함하며, let/const, 화살표 함수, 구조 분해 할당 등을 제공합니다.',
            },
            {
              no: 3,
              title: 'Node.js와 Express',
              content:
                'Node.js는 서버 측에서 JavaScript를 실행할 수 있도록 하는 런타임이며, Express는 이를 위한 경량 웹 프레임워크입니다.',
            },
            {
              no: 4,
              title: 'MongoDB 기본 개념',
              content:
                'MongoDB는 NoSQL 데이터베이스로 JSON과 유사한 문서 기반 데이터를 저장하고 관리할 수 있습니다.',
            },
            {
              no: 5,
              title: '프론트엔드와 백엔드의 차이',
              content:
                '프론트엔드는 사용자가 보는 부분을 개발하는 것이고, 백엔드는 서버와 데이터베이스를 관리하는 부분입니다.',
            },
            {
              no: 6,
              title: '비동기 프로그래밍',
              content:
                'JavaScript의 비동기 처리 방식에는 콜백, 프로미스, async/await가 있습니다.',
            },
            {
              no: 7,
              title: 'Vue Router 사용법',
              content:
                'Vue Router를 사용하면 Vue.js 애플리케이션에서 페이지 이동을 쉽게 처리할 수 있습니다.',
            },
            {
              no: 8,
              title: '컴포넌트 기반 개발',
              content:
                'Vue.js에서는 컴포넌트를 사용하여 UI를 작은 단위로 쪼개서 관리할 수 있습니다.',
            },
            {
              no: 9,
              title: 'CSS와 SCSS 차이점',
              content:
                'SCSS는 CSS의 확장된 버전으로 변수, 중첩, 믹스인 등을 지원합니다.',
            },
            {
              no: 10,
              title: 'Git과 GitHub 사용법',
              content:
                'Git은 버전 관리 시스템이며, GitHub는 이를 활용한 원격 저장소 플랫폼입니다.',
            },
          ]);

          // 아래에 화면처럼 동작하도록 구현해보세요

          const arrow = ref(['▲', '▼']);
          const selectedPost = ref(null);
          const isPostOpen = ref(false);
          const isEditMode = ref(false);

          const clickPost = (post) => {
            if (selectedPost.value?.no === post.no) {
              isPostOpen.value = !isPostOpen.value;
            } else {
              isPostOpen.value = true;
              selectedPost.value = post;
            }
            isEditMode.value = false; // 새 글 클릭 시 수정 모드 리셋
          };

          const sortPost = computed(() => {
            return [...posts.value].sort((a, b) => b.no - a.no);
          });

          const newPostTitle = ref('');
          const newPostContent = ref('');

          const addPost = () => {
            // 빈 문자열 일 경우 동작 안 함
            if (
              newPostTitle.value.trim() === '' ||
              newPostContent.value.trim() === ''
            ) {
              return;
            }

            const newPostID =
              posts.value.length > 0
                ? posts.value[posts.value.length - 1].no + 1
                : 1;

            posts.value.push({
              no: newPostID,
              title: newPostTitle.value,
              content: newPostContent.value,
            });

            newPostTitle.value = '';
            newPostContent.value = '';
          };

          const deletePost = (no) => {
            if (confirm('정말로 삭제하시겠습니까?')) {
              let index = posts.value.findIndex((item) => no === item.no);

              posts.value.splice(index, 1);
            }
          };

          const editingTitle = ref('');
          const editingContent = ref('');

          const editPost = (no) => {
            isEditMode.value = true;
            editingTitle.value = selectedPost.value.title;
            editingContent.value = selectedPost.value.content;
          };

          const updatePost = (no) => {
            const index = posts.value.findIndex((item) => item.no === no);
            if (index !== -1) {
              posts.value[index].title = editingTitle.value;
              posts.value[index].content = editingContent.value;
              isEditMode.value = false;
            }
          };

          return {
            posts,
            isPostOpen,
            selectedPost,
            arrow,
            newPostTitle,
            newPostContent,
            sortPost,
            isEditMode,
            editingTitle,
            editingContent,
            clickPost,
            addPost,
            deletePost,
            editPost,
            updatePost,
          };
        },
      }).mount('#app');
    </script>

    <style>
      body {
        overflow-x: hidden;
      }
      h1 {
        margin-top: 20px;
        text-align: center;
        color: #333;
      }
      ul {
        list-style-type: none;
        padding: 0;
      }
      .post-item {
        cursor: pointer;
        padding: 15px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-weight: bold;
        flex-wrap: wrap;
      }
      .post-item:hover {
        background: #f4f4f4;
      }
      .post-content {
        width: 100%;
        margin-top: 20px;
        padding: 15px;
        border: 1px solid #ac9b9b;
        border-radius: 5px;
        background: #fff;
      }
      button {
        margin-left: 5px;
        padding: 5px 10px;
        border: none;
        background: #ff6b6b;
        color: white;
        cursor: pointer;
        border-radius: 3px;
      }
      button:hover {
        background: #ff4f4f;
      }

      .arrow {
        font-size: 0.8em;
        color: #888;
      }
    </style>
  </body>
</html>
