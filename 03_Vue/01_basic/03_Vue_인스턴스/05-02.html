<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vue 3 연습용 Composition</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  </head>
  <body>
    <div id="app">
      금액: <input type="text" v-model.number="money" /> <br />
      <button @click="deposit()">입금</button>
      <button @click="withdraw()">인출</button>
      <h3>계좌 잔고: [ {{ moneyDeposit }} ]</h3>
    </div>

    <script>
      const { createApp, ref } = Vue;

      createApp({
        setup() {
          let money = ref(0);
          let moneyDeposit = ref(0);

          const deposit = () => {
            moneyDeposit.value += money.value;
          };
          const withdraw = () => {
            moneyDeposit.value -= money.value;
          };
          return {
            money,
            moneyDeposit,
            deposit,
            withdraw,
          };
        },
      }).mount('#app');
    </script>
  </body>
</html>
