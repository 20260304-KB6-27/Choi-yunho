<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      function CallBackFunction(callback, cnt) {
        for (let i = 0; i < cnt; i++) {
          callback();
        }
      }

      let several = function () {
        alert('함수 호출');
      };

      CallBackFunction(several, 3);
    </script>
  </head>

  <body></body>
</html>
